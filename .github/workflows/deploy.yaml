name: Deploying Express Notes app using CI/ED
on:
  push:
    branches:
      - main
jobs:
  develop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code from github to ubuntu
        uses: actions/checkout@v4
      - name: Login in Docker
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: Creating build of our project
        run: |
          docker build -t express_notes_api:latest .
      - name: Pushing registery on docker hub
        run: |
          docker push ${{secrets.DOCKER_USERNAME}}/express_notes_api:latest
      - name: Login to EC2 and deploying code
        uses: appleboy/ssh-login@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USERNAME}}
          key: ${{secrets.EC2_SECRET}}
          script: cd /home/ubuntu
            docker compose pull
            docker compose up -d
